<main>
    <h2>Timesheet</h2>
        <p>Enter hours for current work period:</p>
    <form class="timesheet-form">
        <div class="day">
            <label for="monday"><b>Monday:</b></label>
            <input type="number" id="monday" name="monday">
        </div>
        <div class="day">
            <label for="tuesday"><b>Tuesday:</b></label>
            <input type="number" id="tuesday" name="tuesday">
        </div>
        <div class="day">
            <label for="wednesday"><b>Wednesday:</b></label>
            <input type="number" id="wednesday" name="wednesday">
        </div>
        <div class="day">
            <label for="thursday"><b>Thursday:</b></label>
            <input type="number" id="thursday" name="thursday">
        </div>
        <div class="day">
            <label for="friday"><b>Friday:</b></label>
            <input type="number" id="friday" name="friday">
        </div>
            <input type="submit" value="Submit" class="submit">
    </form>
